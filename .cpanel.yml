---
deployment:
  tasks:
    - export APPPATH=/home/bovioklt/honorarec
    - export PUBLICPATH=/home/bovioklt/public_html
    - /bin/cp -a app "$APPPATH"
    - /bin/cp -a bootstrap "$APPPATH"
    - /bin/cp -a config "$APPPATH"
    - /bin/cp -a database "$APPPATH"
    - /bin/cp -a public "$APPPATH"
    - /bin/cp -a resources "$APPPATH"
    - /bin/cp -a routes "$APPPATH"
    - /bin/cp -a artisan "$APPPATH"
    - /bin/cp -a composer.json "$APPPATH"
    - /bin/cp -a composer.lock "$APPPATH"
    - /bin/cp -a package.json "$APPPATH"
    - /bin/cp -a package-lock.json "$APPPATH"
    - /bin/cp -a vite.config.js "$APPPATH"
    - /bin/cp -a phpunit.xml "$APPPATH"
    - /bin/mkdir -p "$PUBLICPATH/images"
    - /bin/mkdir -p "$PUBLICPATH/build"
    - /bin/cp -a public/.htaccess "$PUBLICPATH/.htaccess"
    - /bin/cp -a public/favicon.ico "$PUBLICPATH/favicon.ico"
    - /bin/cp -a public/robots.txt "$PUBLICPATH/robots.txt"
    - /bin/cp -a public/images/. "$PUBLICPATH/images/"
    - /bin/cp -a public/build/. "$PUBLICPATH/build/"
    - cd "$APPPATH"
    - php artisan migrate --force
    - php artisan optimize:clear
